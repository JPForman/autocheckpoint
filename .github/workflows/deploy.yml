name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  SERVICE: autocheckpoint-api

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/autocheckpoint/api
        run: |
          docker build -f apps/api/Dockerfile \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        id: deploy
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/autocheckpoint/api
        run: |
          URL=$(gcloud run deploy ${{ env.SERVICE }} \
            --image $IMAGE:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 4000 \
            --set-env-vars "NODE_ENV=production,TRUST_PROXY=1,CORS_ORIGIN=${{ secrets.FIREBASE_HOSTING_URL }},FRONTEND_URL=${{ secrets.FIREBASE_HOSTING_URL }},SCHEDULING_TIMEZONE=UTC" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,JWT_ACCESS_SECRET=JWT_ACCESS_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest" \
            --format="value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Install linux native bindings
        run: npm install --no-save @rolldown/binding-linux-x64-gnu@1.0.0-rc.18 lightningcss-linux-x64-gnu@1.32.0 @tailwindcss/oxide-linux-x64-gnu@4.3.0

      - name: Build web app
        run: npm run build -w web
        env:
          VITE_API_BASE_URL: ${{ needs.deploy-backend.outputs.url }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
